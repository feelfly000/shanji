<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="山迹轨迹库，集中展示从 KML、GPX、KMZ 导入的候选轨迹。">
  <title>轨迹库｜山迹</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="./assets/styles.css?v=1.5">
</head>
<body>
  <main class="detail-page track-tool-page">
    <a class="back-link" href="./index.html">返回山迹首页</a>
    <section class="detail-hero track-tool-hero" style="--detail-color:#4f9071">
      <div>
        <span class="status-chip">V1.4 轨迹复核</span>
        <h1>轨迹库</h1>
        <p>集中查看导入轨迹、筛选可入库候选，并用地图预览快速判断线路价值。</p>
      </div>
      <div class="track-tool-summary" id="trackToolSummary" aria-label="轨迹库概览"></div>
    </section>

    <section class="track-toolbar" aria-label="轨迹筛选工具">
      <label class="track-search">
        <span>搜索</span>
        <input id="trackSearchInput" type="search" placeholder="路线名、编号、区域">
      </label>
      <label class="track-field">
        <span>区域</span>
        <select id="trackRegionFilter">
          <option value="all">全部区域</option>
        </select>
      </label>
      <label class="track-field">
        <span>状态</span>
        <select id="trackStatusFilter">
          <option value="all">全部状态</option>
        </select>
      </label>
      <label class="track-field">
        <span>排序</span>
        <select id="trackSortSelect">
          <option value="score-desc">评分优先</option>
          <option value="distance-asc">距离从短到长</option>
          <option value="distance-desc">距离从长到短</option>
          <option value="ascent-desc">爬升从高到低</option>
          <option value="region-asc">按区域</option>
        </select>
      </label>
      <button class="small-button track-reset" id="trackResetButton" type="button">重置</button>
      <div class="track-quick-tags" id="trackQuickTags" aria-label="快捷标签">
        <button type="button" class="track-tag active" data-track-quick="all">全部</button>
        <button type="button" class="track-tag" data-track-quick="matched">高匹配导入</button>
        <button type="button" class="track-tag" data-track-quick="route">有路线详情</button>
        <button type="button" class="track-tag" data-track-quick="score80">高评分</button>
        <button type="button" class="track-tag" data-track-quick="reference">跨区参考</button>
      </div>
    </section>

    <section class="track-workbench">
      <section class="track-preview-panel" aria-label="轨迹地图预览">
        <div class="panel-title">
          <h2>地图预览</h2>
          <span id="trackResultCount">0 条</span>
        </div>
        <div class="track-overview-map" id="trackLibraryMap"></div>
        <div class="track-preview-detail" id="trackPreviewDetail"></div>
      </section>

      <section class="track-results-panel" aria-label="轨迹列表">
        <div class="panel-title">
          <h2>轨迹列表</h2>
          <span>点击条目切换预览</span>
        </div>
        <div class="track-library-list" id="trackLibraryList"></div>
      </section>
    </section>
  </main>
  <script src="./data/tracks.js?v=1.4"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="./assets/track-viewer.js?v=1.5"></script>
</body>
</html>
