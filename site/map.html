<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="山迹路线分布图，查看福州周边徒步路线在地图上的位置、区域、难度和距离。">
  <title>路线分布图｜山迹</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="./assets/styles.css?v=1.6">
</head>
<body>
  <main class="detail-page map-page">
    <a class="back-link" href="./index.html">返回山迹首页</a>

    <section class="detail-hero map-hero" style="--detail-color:#5f9e78">
      <span class="status-chip">路线分布图</span>
      <h1>福州周边徒步路线分布</h1>
      <p>路线点位直接叠加在开源地图上。当前为路线起点或近似坐标，正式出行前请复核天气、交通、开放状态和现场路况。</p>
    </section>

    <section class="map-summary-bar" aria-label="路线统计">
      <div><strong id="distributionTotal">0</strong><span>可查看路线</span></div>
      <div><strong id="distributionTransit">0</strong><span>公共交通较方便</span></div>
      <div><strong id="distributionEasy">0</strong><span>轻松 / 新手友好</span></div>
      <div><strong id="distributionShown">0</strong><span>当前显示</span></div>
    </section>

    <section class="distribution-shell distribution-shell-wide">
      <aside class="distribution-tools" aria-label="地图筛选">
        <label class="distribution-search">
          <span>搜索路线</span>
          <input id="distributionSearch" type="search" placeholder="鼓山、看海、福清、新手">
        </label>

        <label class="distribution-field">
          <span>区域</span>
          <select id="distributionRegion">
            <option value="">全部区域</option>
          </select>
        </label>

        <label class="distribution-field">
          <span>难度</span>
          <select id="distributionDifficulty">
            <option value="">全部难度</option>
          </select>
        </label>

        <label class="distribution-field">
          <span>风景 / 主题</span>
          <select id="distributionGroupBy">
            <option value="">全部风景 / 主题</option>
          </select>
        </label>

        <div class="distribution-actions">
          <button class="small-button" id="distributionReset" type="button">重置</button>
          <button class="small-button" id="distributionFit" type="button">查看全部点位</button>
        </div>
      </aside>

      <section class="distribution-map-card" aria-label="路线地图">
        <div class="distribution-map" id="routeDistributionMap"></div>
        <div class="map-legend distribution-legend">
          <span><b class="legend-dot easy"></b>轻松</span>
          <span><b class="legend-dot medium"></b>中等</span>
          <span><b class="legend-dot hard"></b>较难</span>
          <span>点击点位可打开路线卡片，同一区域密集时可放大地图查看。</span>
        </div>
      </section>

      <section class="distribution-list-panel" aria-label="路线列表">
        <div class="panel-title">
          <h2>当前路线</h2>
          <span class="status-chip" id="distributionListCount">0条</span>
        </div>
        <div class="distribution-list" id="distributionList"></div>
      </section>
    </section>
  </main>

  <script src="./data/routes.js?v=1.6"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="./assets/map-page.js?v=1.8"></script>
</body>
</html>
