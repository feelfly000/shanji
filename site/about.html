<body>
  <main class="detail-page">
    <a class="back-link" href="./index.html">返回山迹首页</a>
    <section class="detail-hero" style="--detail-color:#1f6f5b">
      <span class="status-chip">关于山迹</span>
      <h1>山迹</h1>
      <p>山迹是福州徒步线路库，聚合福州周边值得走的徒步路线和户外俱乐部每周活动信息。</p>
    </section>
    <section class="detail-page-main">
      <h2>我们解决什么问题</h2>
      <p>路线攻略分散、俱乐部活动分散、强度和风险不好比较，是很多人选择徒步路线时的痛点。山迹希望把路线资料和活动信息放在一个清晰、可筛选、可复核的地方。</p>
      <h2>当前阶段</h2>
      <p>当前是 V1.4 路线复核版，路线、轨迹和活动仍需持续复核。请不要把测试数据或导入轨迹当成正式导航依据。</p>
      <h2>不做什么</h2>
      <p>山迹不直接组织活动，不代收费用，不开放公开用户投稿。俱乐部活动信息未来采用合作俱乐部提交、山迹人工审核的方式。</p>
    </section>
  </main>
