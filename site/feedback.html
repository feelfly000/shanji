<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="山迹测试反馈入口，用于收集路线信息纠错、俱乐部活动信息和产品体验反馈。">
  <title>反馈入口｜山迹</title>
  <link rel="stylesheet" href="./assets/styles.css?v=1.4">
</head>
<body>
  <main class="detail-page">
    <a class="back-link" href="./index.html">返回山迹首页</a>
    <section class="detail-hero" style="--detail-color:#5f9e78">
      <span class="status-chip">测试反馈</span>
      <h1>帮助山迹变得更准、更好用</h1>
      <p>当前先使用人工反馈方式，不开放公开投稿。</p>
    </section>
    <section class="detail-page-main">
      <h2>可以反馈什么</h2>
      <p>路线封闭、施工、塌方、杂草严重、交通变化、GPX问题、活动信息错误、页面不好用的地方，都可以记录下来。</p>
      <h2>建议反馈格式</h2>
      <p>路线/活动名称、发现日期、问题描述、照片或轨迹、你的建议。</p>
      <h2>后续方案</h2>
      <p>V1.4 先保留反馈页面，并把路线复核阻塞项作为优先收集方向。正式测试时可以接入问卷、邮箱或合作俱乐部表格。</p>
    </section>
  </main>
</body>
